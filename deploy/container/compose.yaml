services:
  gateway:
    image: dsmctl-gateway:dev
    platform: linux/amd64
    build:
      context: ../..
      dockerfile: deploy/container/Dockerfile
      args:
        VERSION: dev
    restart: unless-stopped
    user: "10001:10001"
    read_only: true
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 128
    mem_limit: 256m
    cpus: 1.0
    ports:
      - "127.0.0.1:18765:8080"
    volumes:
      - type: bind
        source: ./data
        target: /data
      - type: bind
        source: ./secrets
        target: /run/secrets
        read_only: true
    env_file:
      - path: ./secrets/dsm-passwords.env
        required: false
    tmpfs:
      - /tmp:size=16m,mode=1777,uid=10001,gid=10001
    command:
      - --listen=0.0.0.0:8080
      - --state=/data/gateway.db
      - --master-key-file=/run/secrets/master.key
      - --allowed-hosts=${DSMCTL_ALLOWED_HOSTS:-localhost,127.0.0.1}
      - --allowed-origins=${DSMCTL_ALLOWED_ORIGINS:-http://localhost:18765,http://127.0.0.1:18765}
      - --trusted-proxies=${DSMCTL_TRUSTED_PROXIES:-}
    logging:
      driver: json-file
      options:
        max-size: 10m
        max-file: "3"
