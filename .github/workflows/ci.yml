name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - run: go test ./...
      - run: go vet ./...
      - run: go build ./cmd/dsmctl ./cmd/dsmctl-mcp ./cmd/dsmctl-gateway
      - run: go build -trimpath -o /tmp/dsmctl-gateway ./cmd/dsmctl-gateway
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
      - run: docker build --platform linux/amd64 --provenance=false --build-arg VERSION=ci -f deploy/container/Dockerfile -t dsmctl-gateway:ci .
      - name: Smoke-test hardened gateway image
        shell: bash
        run: |
          gateway_tmp="$(mktemp -d)"
          gateway_container=""
          cleanup() {
            if [[ -n "$gateway_container" ]]; then
              docker rm -f "$gateway_container" >/dev/null 2>&1 || true
            fi
            rm -rf "$gateway_tmp"
          }
          trap cleanup EXIT
          printf '{"nas":{}}\n' > "$gateway_tmp/config.json"
          printf '0123456789abcdef0123456789abcdef\n' > "$gateway_tmp/dev-token"
          gateway_container="$(docker run -d \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --tmpfs /tmp:size=16m \
            -p 127.0.0.1:18765:8080 \
            -v "$gateway_tmp/config.json:/data/config.json:ro" \
            -v "$gateway_tmp/dev-token:/run/secrets/dev-token:ro" \
            dsmctl-gateway:ci)"
          test "$(docker inspect --format '{{.Config.User}}' "$gateway_container")" = "10001:10001"
          test "$(docker inspect --format '{{.HostConfig.ReadonlyRootfs}}' "$gateway_container")" = "true"
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:18765/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$gateway_container"
          exit 1
