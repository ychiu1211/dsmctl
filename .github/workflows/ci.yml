name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  test:
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Guard against live-test environment variables
        shell: bash
        run: |
          leaked=""
          for var in DSMCTL_LIVE_NAS DSMCTL_LIVE_CONFIG DSMCTL_MCP_BINARY DSMCTL_LIVE_MUTATIONS DSMCTL_LIVE_SAN_MUTATIONS; do
            if [[ -n "${!var:-}" ]]; then
              echo "::error::$var is set in CI; live and destructive DSM tests must never run in CI"
              leaked="1"
            fi
          done
          if [[ -n "$leaked" ]]; then
            exit 1
          fi
          echo "no live-test environment variables set; integration live tests will skip"
      - name: Resolve and verify shared source version
        shell: bash
        run: |
          source_version="$(go run ./cmd/dsmctl --version | awk '{print $NF}')"
          test "$source_version" = "$(go run ./cmd/dsmctl-mcp --version | awk '{print $NF}')"
          test "$source_version" = "$(go run ./cmd/dsmctl-gateway --version | awk '{print $NF}')"
      - run: go build ./cmd/dsmctl ./cmd/dsmctl-mcp ./cmd/dsmctl-gateway
      - run: go vet ./...
      - run: go test ./...
      - name: Confirm live integration tests skip without a live environment
        shell: bash
        run: go test ./integration -run Live -v

  gateway-image:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - name: Resolve shared source version
        shell: bash
        run: |
          source_version="$(go run ./cmd/dsmctl --version | awk '{print $NF}')"
          echo "DSMCTL_SOURCE_VERSION=$source_version" >> "$GITHUB_ENV"
      - run: go build -trimpath -o /tmp/dsmctl-gateway ./cmd/dsmctl-gateway
        env:
          CGO_ENABLED: "0"
          GOOS: linux
          GOARCH: amd64
      - run: |
          docker build --platform linux/amd64 --provenance=false --build-arg "VERSION=$DSMCTL_SOURCE_VERSION" -f deploy/container/Dockerfile -t dsmctl-gateway:ci .
          test "$(docker image inspect dsmctl-gateway:ci --format '{{index .Config.Labels "org.opencontainers.image.version"}}')" = "$DSMCTL_SOURCE_VERSION"
          test "$(docker run --rm dsmctl-gateway:ci --version)" = "dsmctl-gateway $DSMCTL_SOURCE_VERSION"
      - name: Smoke-test hardened gateway image
        shell: bash
        run: |
          gateway_tmp="$(mktemp -d)"
          gateway_container=""
          cleanup() {
            if [[ -n "$gateway_container" ]]; then
              docker rm -f "$gateway_container" >/dev/null 2>&1 || true
            fi
            rm -rf "$gateway_tmp"
          }
          trap cleanup EXIT
          mkdir "$gateway_tmp/secrets"
          printf '0123456789abcdef0123456789abcdef' > "$gateway_tmp/secrets/master.key"
          chmod 0755 "$gateway_tmp/secrets"
          chmod 0600 "$gateway_tmp/secrets/master.key"
          sudo chown 10001:10001 "$gateway_tmp/secrets/master.key"
          gateway_container="$(docker run -d \
            --read-only \
            --cap-drop ALL \
            --security-opt no-new-privileges \
            --tmpfs /tmp:size=16m \
            --tmpfs /data:size=16m,mode=0700,uid=10001,gid=10001 \
            -p 127.0.0.1:18765:8080 \
            -v "$gateway_tmp/secrets:/run/secrets:ro" \
            dsmctl-gateway:ci)"
          test "$(docker inspect --format '{{.Config.User}}' "$gateway_container")" = "10001:10001"
          test "$(docker inspect --format '{{.HostConfig.ReadonlyRootfs}}' "$gateway_container")" = "true"
          for attempt in $(seq 1 20); do
            if curl --fail --silent http://127.0.0.1:18765/healthz >/dev/null; then
              exit 0
            fi
            sleep 1
          done
          docker logs "$gateway_container"
          exit 1
