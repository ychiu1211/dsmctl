name: CLI and DSM package release

on:
  workflow_dispatch:
    inputs:
      package_version:
        description: Full compatibility-train version, for example 7.3.2-1
        required: true
  push:
    tags:
      - dsmctl-v*

permissions:
  contents: write

concurrency:
  group: dsmctl-release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
        with:
          fetch-depth: 0
      - uses: actions/setup-go@v7
        with:
          go-version-file: go.mod
          cache: true
      - uses: docker/setup-buildx-action@v3
      - name: Resolve deterministic build inputs
        shell: bash
        env:
          DISPATCH_PACKAGE_VERSION: ${{ inputs.package_version }}
        run: |
          if [[ "${{ github.event_name }}" == "workflow_dispatch" ]]; then
            package_version="$DISPATCH_PACKAGE_VERSION"
          else
            package_version="${GITHUB_REF_NAME#dsmctl-v}"
          fi
          [[ "$package_version" =~ ^[0-9]+\.[0-9]+\.[0-9]+-[1-9][0-9]*$ ]]
          source_version="$(go run ./cmd/dsmctl --version | awk '{print $NF}')"
          test "$package_version" = "$source_version"
          release_tag="dsmctl-v$package_version"
          if [[ "${{ github.event_name }}" != "workflow_dispatch" ]]; then
            test "$GITHUB_REF_NAME" = "$release_tag"
          fi
          echo "PACKAGE_VERSION=$package_version" >> "$GITHUB_ENV"
          echo "RELEASE_TAG=$release_tag" >> "$GITHUB_ENV"
          echo "REVISION=$GITHUB_SHA" >> "$GITHUB_ENV"
          echo "SOURCE_DATE_EPOCH=$(git show -s --format=%ct "$GITHUB_SHA")" >> "$GITHUB_ENV"
          echo "CREATED=$(git show -s --format=%cI "$GITHUB_SHA")" >> "$GITHUB_ENV"
      - name: Test source
        run: |
          bash scripts/check-no-lab-data.sh
          go test ./... -count=1
          go vet ./...
      - name: Build deterministic CLI archives
        shell: bash
        run: bash scripts/build-cli-release.sh "$PACKAGE_VERSION" dist
      - name: Build the internal DSM package image
        shell: bash
        run: |
          mkdir -p dist
          docker buildx build --platform linux/amd64 --provenance=false --load \
            --metadata-file "$RUNNER_TEMP/buildkit-metadata.json" \
            --build-arg "VERSION=$PACKAGE_VERSION" \
            --build-arg "REVISION=$REVISION" \
            --build-arg "CREATED=$CREATED" \
            -f deploy/container/Dockerfile \
            -t dsmctl-gateway:release .
          test "$(docker image inspect dsmctl-gateway:release --format '{{.Os}}/{{.Architecture}}')" = "linux/amd64"
          test "$(docker image inspect dsmctl-gateway:release --format '{{.Config.User}}')" = "10001:10001"
          license_container="$(docker create dsmctl-gateway:release)"
          trap 'docker rm -f "$license_container" >/dev/null 2>&1 || true' EXIT
          docker cp "$license_container:/LICENSE" "$RUNNER_TEMP/image-LICENSE"
          cmp LICENSE "$RUNNER_TEMP/image-LICENSE"
          docker rm "$license_container" >/dev/null
          trap - EXIT
      - name: Build and validate the deterministic DSM package twice
        shell: bash
        run: |
          deploy/synology/build-spk.sh "$PACKAGE_VERSION" dsmctl-gateway:release dist/first
          deploy/synology/build-spk.sh "$PACKAGE_VERSION" dsmctl-gateway:release dist/second
          cmp "dist/first/dsmctl-gateway-$PACKAGE_VERSION-x86_64.spk" "dist/second/dsmctl-gateway-$PACKAGE_VERSION-x86_64.spk"
          deploy/synology/validate-spk.sh "dist/first/dsmctl-gateway-$PACKAGE_VERSION-x86_64.spk"
          cp "dist/first/dsmctl-gateway-$PACKAGE_VERSION-x86_64.spk" dist/
          rm -rf dist/first dist/second
          cp deploy/synology/SUPPORTED.md dist/SUPPORTED.md
          cp LICENSE scripts/install.sh scripts/install.ps1 dist/
      - name: Smoke-test generic Compose controls and persistence
        shell: bash
        run: |
          smoke="$(mktemp -d)"
          trap 'docker compose --env-file "$smoke/.env" -f deploy/linux/compose.yaml down >/dev/null 2>&1 || true; rm -rf "$smoke"' EXIT
          mkdir "$smoke/data" "$smoke/secrets"
          head -c 32 /dev/urandom > "$smoke/secrets/master.key"
          chmod 700 "$smoke/data" "$smoke/secrets"
          chmod 600 "$smoke/secrets/"*
          cat > "$smoke/.env" <<EOF
          DSMCTL_IMAGE=dsmctl-gateway:release
          DSMCTL_UID=$(id -u)
          DSMCTL_GID=$(id -g)
          DSMCTL_DATA_DIR=$smoke/data
          DSMCTL_SECRET_DIR=$smoke/secrets
          DSMCTL_PORT=18765
          DSMCTL_PUBLIC_ORIGIN=https://gateway.example.test
          EOF
          docker compose --env-file "$smoke/.env" -f deploy/linux/compose.yaml up -d
          for attempt in $(seq 1 30); do curl -fsS http://127.0.0.1:18765/healthz && break; sleep 1; done
          test "$(curl -sS -o /dev/null -w '%{http_code}' http://127.0.0.1:18765/readyz)" = 503
          setup_password='gateway-ci-password-canary'
          curl -fsS -D "$smoke/setup.headers" \
            -H 'Origin: https://gateway.example.test' \
            -H 'X-DSMCTL-Request: 1' -H 'Content-Type: application/json' \
            --data "{\"username\":\"release-admin\",\"password\":\"$setup_password\"}" \
            http://127.0.0.1:18765/admin/api/setup >/dev/null
          # Match only the session assignment with a non-empty value. Setup also
          # emits an expiring empty-value cookie that clears the pre-7.3.2-19
          # /admin-scoped cookie, and a naive one-capture-per-line extraction
          # would fold both into a newline-joined, malformed Cookie header.
          session_cookie="$(sed -n 's/^[Ss]et-[Cc]ookie: \(dsmctl_admin_session=[^;[:space:]][^;]*\).*/\1/p' "$smoke/setup.headers" | head -n1)"
          test -n "$session_cookie"
          curl -fsS -H "Cookie: $session_cookie" http://127.0.0.1:18765/admin/api/session >/dev/null
          curl -fsS http://127.0.0.1:18765/readyz >/dev/null
          ! grep -a -q "$setup_password" "$smoke/data/gateway.db"
          container="$(docker compose --env-file "$smoke/.env" -f deploy/linux/compose.yaml ps -q gateway)"
          test "$(docker inspect "$container" --format '{{.HostConfig.ReadonlyRootfs}}')" = true
          test "$(docker inspect "$container" --format '{{json .HostConfig.CapDrop}}')" = '["ALL"]'
          docker inspect "$container" --format '{{json .HostConfig.SecurityOpt}}' | grep -q 'no-new-privileges'
          test -z "$(docker inspect "$container" --format '{{range .Mounts}}{{if eq .Destination "/var/run/docker.sock"}}{{.Source}}{{end}}{{end}}')"
          docker compose --env-file "$smoke/.env" -f deploy/linux/compose.yaml restart
          test -f "$smoke/data/gateway.db"
          for attempt in $(seq 1 30); do curl -fsS -H "Cookie: $session_cookie" http://127.0.0.1:18765/admin/api/session && break; sleep 1; done
      - name: Finalize checksums and validate the complete release set
        shell: bash
        run: |
          rm -f dist/SHA256SUMS
          (
            cd dist
            find . -mindepth 1 -maxdepth 1 -type f ! -name SHA256SUMS -printf '%f\n' |
              LC_ALL=C sort |
              xargs sha256sum > SHA256SUMS
          )
          bash scripts/validate-release-assets.sh "$PACKAGE_VERSION" dist
      - uses: actions/upload-artifact@v6
        with:
          name: dsmctl-${{ env.PACKAGE_VERSION }}-release
          path: dist/
          if-no-files-found: error
      - name: Create or update the GitHub prerelease
        if: startsWith(github.ref, 'refs/tags/dsmctl-v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          notes="$RUNNER_TEMP/dsmctl-release-notes.md"
          {
            echo "# dsmctl $PACKAGE_VERSION preview"
            echo
            echo "This preview publishes checksum-verified Windows/Linux amd64 CLI archives"
            echo "and the offline x86_64 Synology DSM package from one revision."
            echo
            echo "The SPK requires DSM 7.2.1 or newer, x86_64, Container Manager, and Web Station."
            echo "Read SUPPORTED.md before manual installation; hardware and lifecycle certification is incomplete."
            echo
            echo "Verify every downloaded asset with SHA256SUMS."
          } > "$notes"

          if gh release view "$RELEASE_TAG" >/dev/null 2>&1; then
            gh release upload "$RELEASE_TAG" dist/* --clobber
            gh release edit "$RELEASE_TAG" --prerelease \
              --title "dsmctl $PACKAGE_VERSION (preview)" --notes-file "$notes"
          else
            gh release create "$RELEASE_TAG" dist/* --verify-tag --prerelease \
              --title "dsmctl $PACKAGE_VERSION (preview)" --notes-file "$notes"
          fi
      - name: Download and re-verify the published prerelease
        if: startsWith(github.ref, 'refs/tags/dsmctl-v')
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          published="$(mktemp -d)"
          trap 'rm -rf "$published"' EXIT
          gh release download "$RELEASE_TAG" --dir "$published"
          bash scripts/validate-release-assets.sh "$PACKAGE_VERSION" "$published"
